<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIMSLF</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #080808;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      position: fixed;
      z-index: 10;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      opacity: 0;
      animation: fadeUp 2s ease 0.6s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translate(-50%, calc(-50% + 10px)); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(48px, 10vw, 88px);
      letter-spacing: 0.18em;
      color: #e8e2d9;
      line-height: 1;
    }

    .divider {
      width: 1px;
      height: 20px;
      background: #2a2a2a;
    }

    .tagline {
      font-family: sans-serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: rgba(180, 174, 164, 0.45);
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div class="content">
    <h1>HIMSLF</h1>
    <div class="divider"></div>
    <p class="tagline">don't worry, i'm coming.</p>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const GRID = 28;
    const pts = [];

    function buildGrid() {
      pts.length = 0;
      const cols = Math.ceil(W / GRID) + 2;
      const rows = Math.ceil(H / GRID) + 2;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          pts.push({
            bx: c * GRID,
            by: r * GRID,
            ox: (Math.random() - 0.5) * 6,
            oy: (Math.random() - 0.5) * 6,
            phase: Math.random() * Math.PI * 2,
            sp: 0.4 + Math.random() * 0.6
          });
        }
      }
    }
    buildGrid();

    const blobs = Array.from({ length: 5 }, () => ({
      x: Math.random(), y: Math.random(),
      vx: (Math.random() - 0.5) * 0.0007,
      vy: (Math.random() - 0.5) * 0.0007,
      r: 0.22 + Math.random() * 0.18,
      phase: Math.random() * Math.PI * 2,
      sp: 0.002 + Math.random() * 0.003
    }));

    function draw() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      t += 0.007;

      ctx.fillStyle = '#080808';
      ctx.fillRect(0, 0, W, H);

      const cols = Math.ceil(W / GRID) + 2;
      const rows = Math.ceil(H / GRID) + 2;
      if (pts.length !== cols * rows) buildGrid();

      ctx.strokeStyle = 'rgba(90,88,84,0.18)';
      ctx.lineWidth = 0.5;

      for (let r = 0; r < rows - 1; r++) {
        for (let c = 0; c < cols - 1; c++) {
          const i = r * cols + c;
          const p   = pts[i];
          const pr  = pts[i + 1];
          const pb  = pts[i + cols];

          const px  = p.bx  + p.ox  + Math.sin(t * p.sp  + p.phase) * 3;
          const py  = p.by  + p.oy  + Math.cos(t * p.sp  + p.phase) * 3;
          const prx = pr.bx + pr.ox + Math.sin(t * pr.sp + pr.phase) * 3;
          const pry = pr.by + pr.oy + Math.cos(t * pr.sp + pr.phase) * 3;
          const pbx = pb.bx + pb.ox + Math.sin(t * pb.sp + pb.phase) * 3;
          const pby = pb.by + pb.oy + Math.cos(t * pb.sp + pb.phase) * 3;

          ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(prx, pry); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(pbx, pby); ctx.stroke();

          const dotAlpha = 0.12 + Math.sin(t * p.sp * 2 + p.phase) * 0.06;
          ctx.fillStyle = `rgba(100,98,94,${dotAlpha})`;
          ctx.beginPath(); ctx.arc(px, py, 0.8, 0, Math.PI * 2); ctx.fill();
        }
      }

      blobs.forEach(b => {
        b.x += b.vx + Math.sin(t * 40 * b.sp + b.phase) * 0.0003;
        b.y += b.vy + Math.cos(t * 30 * b.sp + b.phase) * 0.0003;
        if (b.x < -0.3) b.x = 1.3;
        if (b.x > 1.3)  b.x = -0.3;
        if (b.y < -0.3) b.y = 1.3;
        if (b.y > 1.3)  b.y = -0.3;

        const bx = b.x * W;
        const by = b.y * H;
        const br = (b.r + Math.sin(t * 60 * b.sp + b.phase) * 0.04) * Math.min(W, H);

        const g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
        g.addColorStop(0,   'rgba(30, 28, 26, 0.7)');
        g.addColorStop(0.4, 'rgba(16, 14, 12, 0.35)');
        g.addColorStop(1,   'rgba(0, 0, 0, 0)');

        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
      });

      ctx.globalCompositeOperation = 'source-over';

      const v = ctx.createRadialGradient(W/2, H/2, H * 0.08, W/2, H/2, H * 0.88);
      v.addColorStop(0, 'rgba(0,0,0,0)');
      v.addColorStop(1, 'rgba(0,0,0,0.92)');
      ctx.fillStyle = v;
      ctx.fillRect(0, 0, W, H);

      requestAnimationFrame(draw);
    }

    draw();
  </script>

</body>
</html>
