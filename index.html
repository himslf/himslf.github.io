<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIMSLF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #07070f;
      font-family: 'DM Sans', system-ui, sans-serif;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 36px 52px 40px;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    nav {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.18em;
      color: #f5f3ee;
      text-transform: uppercase;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
      font-weight: 400;
      text-decoration: none;
      text-transform: lowercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: rgba(255,255,255,0.75); }

    .body {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      font-weight: 500;
    }

    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: clamp(72px, 13vw, 140px);
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: #f5f3ee;
      text-transform: uppercase;
    }

    .headline .m {
      color: #4a1a9e;
      text-shadow: 0 0 22px rgba(74,26,158,0.75), 0 0 55px rgba(74,26,158,0.35);
    }

    .footer-row {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .corner-label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-style: italic;
      color: rgba(255,255,255,0.25);
      text-shadow: 0 1px 6px rgba(0,0,0,0.9), 0 0 14px rgba(74,26,158,0.3);
    }

    @media (max-width: 600px) {
      .wrap { padding: 28px 28px 32px; }
      .nav-links { gap: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <svg class="bg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bg1" cx="35%" cy="60%" r="70%">
          <stop offset="0%" stop-color="#110820"/>
          <stop offset="50%" stop-color="#0a0714"/>
          <stop offset="100%" stop-color="#05050d"/>
        </radialGradient>
        <radialGradient id="goo1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#2e0a66" stop-opacity="0.65"/>
          <stop offset="100%" stop-color="#2e0a66" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="goo2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1c0548" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#1c0548" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="goo3" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#0d1a3a" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#0d1a3a" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="vig" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stop-color="transparent"/>
          <stop offset="100%" stop-color="#030306" stop-opacity="0.85"/>
        </radialGradient>
        <filter id="blur2"><feGaussianBlur stdDeviation="45"/></filter>
        <filter id="blur3"><feGaussianBlur stdDeviation="88"/></filter>
      </defs>

      <rect width="1440" height="900" fill="url(#bg1)"/>

      <ellipse cx="320"  cy="560" rx="450" ry="320" fill="url(#goo1)" filter="url(#blur3)"/>
      <ellipse cx="1100" cy="260" rx="380" ry="290" fill="url(#goo2)" filter="url(#blur3)"/>
      <ellipse cx="800"  cy="720" rx="320" ry="220" fill="url(#goo1)" filter="url(#blur2)"/>
      <ellipse cx="1240" cy="650" rx="290" ry="210" fill="url(#goo3)" filter="url(#blur2)"/>
      <ellipse cx="160"  cy="160" rx="260" ry="190" fill="url(#goo2)" filter="url(#blur2)"/>

      <g stroke="rgba(110,60,220,0.06)" stroke-width="0.6">
        <line x1="0" y1="90"  x2="1440" y2="90"/>
        <line x1="0" y1="180" x2="1440" y2="180"/>
        <line x1="0" y1="270" x2="1440" y2="270"/>
        <line x1="0" y1="360" x2="1440" y2="360"/>
        <line x1="0" y1="450" x2="1440" y2="450"/>
        <line x1="0" y1="540" x2="1440" y2="540"/>
        <line x1="0" y1="630" x2="1440" y2="630"/>
        <line x1="0" y1="720" x2="1440" y2="720"/>
        <line x1="0" y1="810" x2="1440" y2="810"/>
      </g>
      <g stroke="rgba(110,60,220,0.06)" stroke-width="0.6">
        <line x1="90"   y1="0" x2="90"   y2="900"/>
        <line x1="180"  y1="0" x2="180"  y2="900"/>
        <line x1="270"  y1="0" x2="270"  y2="900"/>
        <line x1="360"  y1="0" x2="360"  y2="900"/>
        <line x1="450"  y1="0" x2="450"  y2="900"/>
        <line x1="540"  y1="0" x2="540"  y2="900"/>
        <line x1="630"  y1="0" x2="630"  y2="900"/>
        <line x1="720"  y1="0" x2="720"  y2="900"/>
        <line x1="810"  y1="0" x2="810"  y2="900"/>
        <line x1="900"  y1="0" x2="900"  y2="900"/>
        <line x1="990"  y1="0" x2="990"  y2="900"/>
        <line x1="1080" y1="0" x2="1080" y2="900"/>
        <line x1="1170" y1="0" x2="1170" y2="900"/>
        <line x1="1260" y1="0" x2="1260" y2="900"/>
        <line x1="1350" y1="0" x2="1350" y2="900"/>
      </g>

      <g fill="rgba(140,80,255,0.1)">
        <circle cx="450"  cy="360" r="2"/>
        <circle cx="630"  cy="180" r="2"/>
        <circle cx="810"  cy="450" r="2"/>
        <circle cx="990"  cy="270" r="2"/>
        <circle cx="270"  cy="540" r="2"/>
        <circle cx="1080" cy="630" r="2"/>
        <circle cx="90"   cy="270" r="2"/>
        <circle cx="720"  cy="720" r="2"/>
        <circle cx="1260" cy="90"  r="2"/>
      </g>

      <g fill="rgba(255,255,255,0.45)">
        <circle cx="130"  cy="70"  r="1"/>
        <circle cx="340"  cy="200" r="0.8"/>
        <circle cx="620"  cy="110" r="0.9"/>
        <circle cx="820"  cy="290" r="0.8"/>
        <circle cx="1040" cy="85"  r="1.1"/>
        <circle cx="1250" cy="220" r="0.8"/>
        <circle cx="1380" cy="130" r="0.9"/>
        <circle cx="220"  cy="400" r="0.7"/>
        <circle cx="530"  cy="610" r="0.8"/>
        <circle cx="1120" cy="740" r="0.9"/>
        <circle cx="1310" cy="560" r="0.7"/>
        <circle cx="740"  cy="680" r="0.8"/>
        <circle cx="970"  cy="820" r="0.7"/>
        <circle cx="70"   cy="760" r="0.8"/>
      </g>

      <rect width="1440" height="900" fill="url(#vig)"/>
    </svg>

    <nav>
      <a href="/" class="logo">Himslf</a>
      <ul class="nav-links">
        <li><a href="#">words</a></li>
        <li><a href="#">sounds</a></li>
        <li><a href="#">connect</a></li>
      </ul>
    </nav>

    <div class="body">
      <span class="eyebrow">Words &amp; Sounds</span>
      <div class="headline">HI<span class="m">M</span>-<br>SLF.</div>
    </div>

    <div class="footer-row">
      <span class="corner-label">SWIA</span>
    </div>

  </div>
</body>
</html>
